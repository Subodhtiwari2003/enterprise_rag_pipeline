services:
  - type: web
    name: enterprise-rag-pipeline
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health

    envVars:
      # ── Required ─────────────────────────────────────
      - key: GOOGLE_API_KEY
        sync: false          # Set manually in Render dashboard

      # ── LangSmith Tracing (optional but recommended) ─
      - key: LANGCHAIN_API_KEY
        sync: false
      - key: LANGCHAIN_PROJECT
        value: enterprise-rag-pipeline
      - key: LANGCHAIN_TRACING_V2
        value: "true"

      # ── App Config ────────────────────────────────────
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: EMBEDDING_MODEL
        value: models/embedding-001
      - key: CHROMA_PERSIST_DIR
        value: /app/chroma_db
      - key: CHUNK_SIZE
        value: "500"
      - key: CHUNK_OVERLAP
        value: "50"
      - key: TOP_K
        value: "4"